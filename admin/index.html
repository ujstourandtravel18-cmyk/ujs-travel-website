<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UJS Travel - Admin Blog</title>
</head>
<body>
  <script>
    CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'ujstourandtravel18-cmyk/ujs-travel-website',
          branch: 'master',
        },
        media_folder: 'img',
        public_folder: 'img',
        collections: [
          {
            name: 'artikel',
            label: 'Artikel Blog',
            folder: '_artikel',
            create: true,
            fields: [
              { label: 'Judul', name: 'title', widget: 'string' },
              { label: 'Tanggal', name: 'date', widget: 'datetime' },
              { label: 'Kategori', name: 'category', widget: 'select', options: ['wisata-kota', 'tips', 'kuliner', 'destinasi'] },
              { label: 'Estimasi Baca', name: 'readTime', widget: 'string', default: '5 menit baca' },
              { label: 'Foto Utama', name: 'thumbnail', widget: 'image' },
              { label: 'Deskripsi Singkat', name: 'description', widget: 'text' },
              { label: 'Isi Artikel', name: 'body', widget: 'markdown' },
              { label: 'Tags', name: 'tags', widget: 'string', required: false },
              { label: 'Featured', name: 'featured', widget: 'boolean', default: false },
            ],
          },
        ],
      },
    });
  </script>
</body>
</html>
