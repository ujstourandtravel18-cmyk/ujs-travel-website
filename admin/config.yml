backend:
  name: github
  repo: ujstourandtravel18-cmyk/ujs-travel-website
  branch: master

media_folder: "img"
public_folder: "img"

collections:
  - name: "artikel"
    label: "Artikel Blog"
    folder: "_artikel"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul Artikel", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string", hint: "Contoh: wisata-batu-malang (huruf kecil, pakai strip, tanpa spasi)" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - { label: "Wisata Kota", value: "wisata-kota" }
          - { label: "Tips Perjalanan", value: "tips" }
          - { label: "Kuliner", value: "kuliner" }
          - { label: "Destinasi", value: "destinasi" }
      - { label: "Estimasi Baca (contoh: 5 menit baca)", name: "readTime", widget: "string", default: "5 menit baca" }
      - { label: "Foto Utama", name: "thumbnail", widget: "image" }
      - { label: "Deskripsi Singkat (untuk card di blog)", name: "description", widget: "text" }
      - label: "Highlights (poin-poin utama artikel)"
        name: "highlights"
        widget: "list"
        field: { label: "Poin", name: "item", widget: "string" }
      - { label: "Isi Artikel", name: "body", widget: "markdown" }
      - { label: "Tags (pisah dengan koma, contoh: WisataMalang,UJSTravel)", name: "tags", widget: "string", required: false }
      - label: "Featured (tampil di posisi utama blog)"
        name: "featured"
        widget: "boolean"
        default: false